name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/email_service_test
  REDIS_URL: redis://localhost:6379/0
  REDIS_SIDEKIQ_URL: redis://localhost:6379/1
  JWT_SECRET: test-secret
  SECRET_KEY_BASE: test-secret-base
  LOCKBOX_MASTER_KEY: test-master-key-32-chars-long!!!!

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run Rubocop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: email_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Setup Database
        run: |
          bundle exec rails db:create db:migrate
      - name: Run Tests
        run: bundle exec rspec
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/email-service:${{ github.sha }}
            ${{ vars.CONTAINER_REGISTRY }}/email-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Deploy to staging
        run: |
          kubectl set image deployment/email-service-api \
            api=${{ vars.CONTAINER_REGISTRY }}/email-service:${{ github.sha }} \
            --namespace=email-service
          kubectl set image deployment/email-service-sidekiq \
            sidekiq=${{ vars.CONTAINER_REGISTRY }}/email-service:${{ github.sha }} \
            --namespace=email-service
          kubectl rollout status deployment/email-service-api --namespace=email-service --timeout=5m
          kubectl rollout status deployment/email-service-sidekiq --namespace=email-service --timeout=5m
