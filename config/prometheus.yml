global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rails"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: "/metrics"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "sidekiq"
    static_configs:
      - targets: ["sidekiq:3000"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["db:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
