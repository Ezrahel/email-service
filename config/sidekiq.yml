---
:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 15) %>
:pidfile: tmp/pids/sidekiq.pid
:logfile: log/sidekiq.log
:timeout: 30
:queues:
  - [critical, 7]
  - [deliveries, 6]
  - [emails, 5]
  - [webhooks, 4]
  - [events, 3]
  - [analytics, 2]
  - [maintenance, 1]
:scheduler:
  :schedule:
    retry_failed_deliveries:
      cron: "*/5 * * * *"
      class: RetryFailedDeliveryWorker
      queue: maintenance
    metrics_aggregation:
      cron: "*/5 * * * *"
      class: MetricsAggregationWorker
      queue: analytics
    cleanup_worker:
      cron: "0 3 * * *"
      class: CleanupWorker
      queue: maintenance
    partition_maintenance:
      cron: "0 0 1 * *"
      class: PartitionMaintenanceWorker
      queue: maintenance
